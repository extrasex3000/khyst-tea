
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHYST TEA</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f6f6f4;
margin:0;
padding:40px;
color:#111;
}

h1{
font-size:42px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:28px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.image{
width:100%;
aspect-ratio:1/1;
background:#fafafa;
border-radius:12px;
overflow:hidden;
margin-bottom:16px;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.code{
font-size:12px;
letter-spacing:2px;
color:#888;
margin-bottom:6px;
}

.name{
font-size:26px;
font-weight:700;
margin-bottom:4px;
}

.type{
color:#777;
margin-bottom:6px;
}

.notes{
color:#555;
font-size:14px;
margin-bottom:16px;
}

.price{
display:flex;
justify-content:space-between;
border:1px solid #eee;
border-radius:12px;
padding:12px 14px;
margin-bottom:8px;
cursor:pointer;
}

.price:hover{
background:#fafafa;
}

button{
width:100%;
margin-top:10px;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
font-size:14px;
cursor:pointer;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:white;
padding:14px 18px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-size:14px;
}
</style>
</head>

<body>

<div class="cart">
Cart: <span id="cartCount">0</span>
</div>

<h1>KHYST TEA</h1>

<div class="grid" id="grid"></div>

<script>

const TELEGRAM_USERNAME = "ururur1";

const products = [

}

];

let cart = [];

function renderProducts(){

const grid = document.getElementById("grid");
grid.innerHTML = "";

products.forEach((p,i)=>{

let pricesHTML = "";

for(const grams in p.prices){

pricesHTML += `
<div class="price" onclick="addToCart('${p.code}',${grams},${p.prices[grams]})">
<span>${grams} g</span>
<span>${p.prices[grams]} PLN</span>
</div>
`;

}

grid.innerHTML += `

<div class="card">

<div class="image">
<img src="${p.image}">
</div>

<div class="code">${p.code}</div>
<div class="name">${p.name}</div>
<div class="type">${p.type}</div>
<div class="notes">${p.notes}</div>

${pricesHTML}

</div>

`;

});

}

function addToCart(code,grams,price){

cart.push({code,grams,price});
document.getElementById("cartCount").innerText = cart.length;

}

renderProducts();

</script>

</body>
</html>
