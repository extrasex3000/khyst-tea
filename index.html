<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHYST TEA</title>

<style>
:root{
  --bg:#f6f6f4;
  --card:#ffffff;
  --text:#111111;
  --muted:#727272;
  --line:#ece9e3;
  --air:#bfd7e8;
  --amber:#d7a55a;
  --noir:#4f5257;
  --ground:#8e7f68;
  --grow:#9bb37a;
  --root:#7b8d63;
  --aura:#ded6c8;
}

*{box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  margin:0;
  color:var(--text);
}

.page{
  max-width:1240px;
  margin:0 auto;
  padding:36px 24px 80px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:24px;
  margin-bottom:36px;
}

.brand h1{
  font-size:42px;
  margin:0 0 8px 0;
  letter-spacing:0.02em;
}

.brand p{
  margin:0;
  color:var(--muted);
  font-size:15px;
  max-width:560px;
  line-height:1.45;
}

.cart{
  position:sticky;
  top:20px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(10px);
  padding:14px 18px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  font-size:14px;
  white-space:nowrap;
  border:1px solid rgba(0,0,0,0.04);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:28px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:18px;
  box-shadow:0 12px 34px rgba(0,0,0,0.05);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  border:1px solid rgba(0,0,0,0.03);
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 18px 40px rgba(0,0,0,0.10);
}

.series-line{
  height:4px;
  width:72px;
  border-radius:999px;
  margin-bottom:14px;
}

.card[data-series="AIR"] .series-line{background:var(--air);}
.card[data-series="AMBER"] .series-line{background:var(--amber);}
.card[data-series="NOIR"] .series-line{background:var(--noir);}
.card[data-series="GROUND"] .series-line{background:var(--ground);}
.card[data-series="GROW"] .series-line{background:var(--grow);}
.card[data-series="ROOT"] .series-line{background:var(--root);}
.card[data-series="AURA"] .series-line{background:var(--aura);}

.image{
  width:100%;
  aspect-ratio:4/3;
  background:#faf9f6;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:18px;
}

.image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .45s ease;
}

.card:hover .image img{
  transform:scale(1.04);
}

.name{
  font-size:14px;
  font-weight:500;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:0.02em;
}

.code{
  font-size:31px;
  font-weight:850;
  letter-spacing:0.06em;
  line-height:1.02;
  margin-bottom:10px;
}

.type{
  color:#5d5d5d;
  margin-bottom:10px;
  font-size:14px;
}

.notes{
  color:#6f6f6f;
  font-size:12px;
  letter-spacing:0.11em;
  text-transform:uppercase;
  margin-bottom:18px;
}

.prices{
  display:grid;
  gap:10px;
}

.price{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  transition:background .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease;
  background:#fff;
}

.price:hover{
  background:#fbfaf8;
  border-color:#d8d3ca;
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.04);
}

.grams{
  font-size:13px;
  color:#666;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

.amount{
  font-size:15px;
  font-weight:700;
}

@media (max-width: 820px){
  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }

  .cart{
    position:static;
  }

  .brand h1{
    font-size:36px;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="topbar">
    <div class="brand">
      <h1>KHYST TEA</h1>
      <p>Tea catalogue built around flavour lines — Air, Amber, Noir, Ground, Grow, Root and Aura.</p>
    </div>

    <div class="cart">
      Cart · <span id="cartCount">0</span> items
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const TELEGRAM_USERNAME = "ururur1";

const products = [
{
code:"AIR 1",
name:"Tie Guan Yin",
type:"Light Oolong · China",
notes:"orchid · honey · flowers",
image:"air1.jpg",
prices:{50:65,100:130,200:250}
},
{
code:"AIR 2",
name:"Dong Ding",
type:"Oolong",
notes:"cream · honey · flowers",
image:"air2.jpg",
prices:{50:58,100:115,200:220}
},
{
code:"AIR 3",
name:"Dong Fang Mei Ren",
type:"Oolong",
notes:"honey · fruit · spice",
image:"air3.jpg",
prices:{50:60,100:120,200:230}
},
{
code:"AMBER 2",
name:"Dian Hong Jin Luo",
type:"Black Tea · Yunnan",
notes:"honey · malt · cacao",
image:"amber2.jpg",
prices:{50:53,100:105,200:200}
},
{
code:"NOIR 4",
name:"Shui Xian",
type:"Roasted Oolong",
notes:"wood · orchid · dried fruit",
image:"noir4.jpg",
prices:{50:70,100:140,200:260}
},
{
code:"GROUND 1",
name:"GABA Ruanzhi",
type:"GABA Oolong",
notes:"honey · caramel · cherry",
image:"ground1.jpg",
prices:{50:58,100:115,200:220}
},
{
code:"GROUND 4",
name:"GABA Black",
type:"GABA Oolong",
notes:"mango · chocolate · caramel",
image:"ground4.jpg",
prices:{50:60,100:120,200:230}
},
{
code:"GROW 2",
name:"Huang Shan Mao Feng",
type:"Green Tea",
notes:"umami · chestnut · flowers",
image:"grow2.jpg",
prices:{50:45,100:90,200:170}
},
{
code:"ROOT 3",
name:"Hong Tai Chang Shu 2015",
type:"Shu Pu-erh",
notes:"wood · earth · chocolate",
image:"root3.jpg",
prices:{50:100,100:200,200:380}
},
{
code:"ROOT 9",
name:"Dayi 7572",
type:"Shu Pu-erh cake",
notes:"classic factory shu",
image:"root9.jpg",
prices:{200:200}
},
{
code:"AURA 3",
name:"Bai Hao Yin Zhen",
type:"White Tea",
notes:"flowers · honey · spring herbs",
image:"aura3.jpg",
prices:{50:48,100:95,200:180}
},
{
code:"AURA 6",
name:"White Gu Shu",
type:"White Tea",
notes:"flowers · honey · dried fruit",
image:"aura6.jpg",
prices:{50:58,100:115,200:220}
}
];

let cart = [];

function getSeries(code){
  return code.split(" ")[0];
}

function renderProducts(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  products.forEach((p)=>{
    const series = getSeries(p.code);
    let pricesHTML = "";

    for(const grams in p.prices){
      pricesHTML += `
      <div class="price" onclick="addToCart('${p.code}',${grams},${p.prices[grams]})">
        <span class="grams">${grams} g</span>
        <span class="amount">${p.prices[grams]} PLN</span>
      </div>
      `;
    }

    grid.innerHTML += `
    <div class="card" data-series="${series}">
      <div class="series-line"></div>

      <div class="image">
        <img src="${p.image}" alt="${p.name}">
      </div>

      <div class="name">${p.name}</div>
      <div class="code">${p.code}</div>
      <div class="type">${p.type}</div>
      <div class="notes">${p.notes}</div>

      <div class="prices">
        ${pricesHTML}
      </div>
    </div>
    `;
  });
}

function addToCart(code,grams,price){
  cart.push({code,grams,price});
  document.getElementById("cartCount").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
